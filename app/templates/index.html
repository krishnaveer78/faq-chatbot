<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="chat-wrapper">
            <!-- Header -->
            <div class="chat-header">
                <div class="header-content">
                    <h1>💬 FAQ Chatbot</h1>
                    <p>Ask me anything about our products and services!</p>
                </div>
            </div>

            <!-- Chat Messages Area -->
            <div class="chat-messages" id="chatMessages">
                <div class="message bot-message">
                    <div class="message-content">
                        <p>Hello! 👋 Welcome to our FAQ Chatbot. I'm here to help answer your questions about our products and services. Just type your question below!</p>
                    </div>
                    <div class="message-time">Just now</div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <form id="chatForm" class="chat-form">
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="userInput" 
                            placeholder="Type your question here..." 
                            autocomplete="off"
                            required
                        >
                        <button type="submit" class="send-btn" id="sendBtn">
                            <span>Send</span>
                            <span class="icon">→</span>
                        </button>
                    </div>
                    <div class="input-suggestions" id="suggestions"></div>
                </form>
            </div>
        </div>

        <!-- Sidebar with FAQ List -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>📚 FAQ Topics</h3>
            </div>
            <div class="faq-list" id="faqList">
                <p class="loading">Loading FAQs...</p>
            </div>
        </div>
    </div>

    <!-- Modal for Feedback -->
    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Help us improve!</h2>
            <p>Was this answer helpful?</p>
            <div class="feedback-buttons">
                <button class="btn btn-success" onclick="sendFeedback(true)">👍 Yes</button>
                <button class="btn btn-danger" onclick="sendFeedback(false)">👎 No</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
